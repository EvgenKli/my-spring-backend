# 1. Объявляем два последовательных этапа конвейера
stages:
  - build-and-pack
  - deploy-to-k8s

# Этап сборки
build-java-app:
  stage: build-and-pack
  tags:
    - build

  script:
    # 1. Runner авторизируется в Container Registry
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN

    # 2. Runner запускает сборку Docker-образа, используя Dockerfile
    - docker build -t $CI_REGISTRY_IMAGE:latest .

    # 3. Runner отправляет готовый образ на GitLab Container Registry
    - docker push $CI_REGISTRY_IMAGE:latest

deploy-java-app:
  stage: deploy-to-k8s
  tags:
    - build # Используется тот же Runner
  script:
    # Runner отправляет команду обновления на Мастер-ноду K8s
    # Запускаем SSH, принудительно передавая файл ключа из переменной GitLab
    # Опция -o WarnWeakCrypto=no отключает квантовое предупреждение OpenSSH
    # Принудительно перезапускаем deployment, и Kubernetes сам скачивает свежий образ из Registry
    - ssh -i $SSH_PRIVATE_KEY -o StrictHostKeyChecking=no -o WarnWeakCrypto=no root@5.35.28.230 "kubectl rollout restart deployment/spring-backend-deployment"